name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: build
        run: cargo build --release --target ${{ matrix.target }}
      - name: package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf nosh-${{ matrix.target }}.tar.gz nosh
          shasum -a 256 nosh-${{ matrix.target }}.tar.gz > checksum.txt
      - name: release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/${{ matrix.target }}/release/nosh-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/checksum.txt
          generate_release_notes: true

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: trigger homebrew formula update
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_PAT }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh workflow run update-formula.yml \
            --repo gosantos/homebrew-nosh \
            --ref main \
            -f version="$version"
